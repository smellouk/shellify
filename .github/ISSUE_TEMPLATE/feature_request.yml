name: Feature Request
description: Suggest a new feature or improvement for Shellify
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem you're trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you're running into. Focus on the "why", not the solution.
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any other approaches or workarounds?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - PWA / Web app management
        - Isolation / Privacy
        - Ad blocking
        - Translation
        - App lock / Security
        - Backup & restore
        - Browser engine
        - Shortcuts
        - Theming / Appearance
        - Onboarding
        - Settings
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, screenshots, links to similar features in other apps, etc.
    validations:
      required: false
