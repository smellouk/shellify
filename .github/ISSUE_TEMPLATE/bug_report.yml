name: Bug Report
description: Report a bug or unexpected behavior in Shellify
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe the expected behavior...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open Shellify
        2. Go to '...'
        3. Tap '...'
        4. See error
    validations:
      required: true

  - type: dropdown
    id: engine
    attributes:
      label: Browser engine
      options:
        - System WebView (default)
        - GeckoView
        - Not applicable
    validations:
      required: true

  - type: input
    id: android_version
    attributes:
      label: Android version
      placeholder: e.g. Android 14 (API 34)
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: e.g. Pixel 8, Samsung Galaxy S24
    validations:
      required: false

  - type: input
    id: app_version
    attributes:
      label: Shellify version
      placeholder: e.g. 1.0.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or crash output
      description: Paste any relevant logcat output or crash stack trace.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information that might help — screenshots, screen recordings, etc.
    validations:
      required: false
